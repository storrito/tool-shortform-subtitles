<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Caption Clip Wipe Subtitle Overlay</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="params-data.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1080px;
        height: 1920px;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      #caption-clip-wipe {
        pointer-events: none;
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: transparent;
      }

      .wp-overlay {
        position: absolute;
        inset: 0;
        background: transparent;
        z-index: 1;
        pointer-events: none;
      }

      #wp-container {
        position: absolute;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }

      .wp-group {
        position: absolute;
        bottom: 650px;
        left: 0;
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        justify-content: center;
        gap: 18px 24px;
        padding: 0 76px;
        visibility: hidden;
      }

      .wp-word {
        font-family: "Poppins", sans-serif;
        font-weight: 800;
        font-size: 76px;
        text-transform: uppercase;
        color: #ffffff;
        display: inline-block;
        letter-spacing: 0.02em;
        line-height: 1.08;
        padding: 4px 2px 8px;
        clip-path: inset(0 100% 0 0);
        text-shadow:
          0 4px 0 rgba(0, 0, 0, 0.82),
          0 12px 30px rgba(0, 0, 0, 0.78),
          0 0 22px rgba(0, 0, 0, 0.5);
        will-change: clip-path, color, opacity;
      }
    </style>
  </head>
  <body>
    <div
      id="caption-clip-wipe"
      data-composition-id="caption-clip-wipe"
      data-root="true"
      data-timeline-locked
      data-start="0"
      data-duration="60"
      data-fps="30"
      data-width="1080"
      data-height="1920"
    >
      <div class="wp-overlay"></div>
      <div id="wp-container"></div>
    </div>

    <script>
      // Adapted from the installed registry component:
      // compositions/components/caption-clip-wipe.html
      (function () {
        window.__timelines = window.__timelines || {};

        var data = window.__hyperframesParams;
        var WORDS = data.words;
        var RAW_GROUPS = data.rawGroups;
        var DURATION = data.duration;

        document
          .getElementById("caption-clip-wipe")
          .setAttribute("data-duration", String(DURATION));

        var _fitCanvas = document.createElement("canvas");
        var _fitCtx = _fitCanvas.getContext("2d");
        function fitFontSize(text, baseFontSize, fontWeight, fontFamily, maxWidth) {
          var size = baseFontSize;
          var minSize = Math.floor(baseFontSize * 0.55);
          while (size > minSize) {
            _fitCtx.font = fontWeight + " " + size + "px " + fontFamily;
            if (_fitCtx.measureText(text).width <= maxWidth) return size;
            size -= 2;
          }
          return minSize;
        }

        var GROUPS = RAW_GROUPS.map(function (pair, gi) {
          var ws = pair[0],
            we = pair[1];
          var nextStart = gi + 1 < RAW_GROUPS.length ? WORDS[RAW_GROUPS[gi + 1][0]].start : DURATION;
          var gEnd = Math.min(WORDS[we].end + 0.5, nextStart - 0.05);
          return { wordStart: ws, wordEnd: we, start: WORDS[ws].start, end: gEnd };
        });

        var container = document.getElementById("wp-container");
        var tl = gsap.timeline({ paused: true });

        GROUPS.forEach(function (g, gi) {
          var groupWords = WORDS.slice(g.wordStart, g.wordEnd + 1);
          var grp = document.createElement("div");
          grp.className = "wp-group";
          grp.id = "wp-grp-" + gi;

          var groupText = groupWords
            .map(function (w) {
              return w.text.toUpperCase();
            })
            .join(" ");
          var computedSize = fitFontSize(groupText, 76, "800", "Poppins", 920);

          groupWords.forEach(function (w, i) {
            var wi = g.wordStart + i;
            var span = document.createElement("span");
            span.className = "wp-word";
            span.id = "wp-w-" + wi;
            span.textContent = w.text.toUpperCase();
            span.style.fontSize = computedSize + "px";
            grp.appendChild(span);
          });

          container.appendChild(grp);
          tl.set(grp, { visibility: "visible", opacity: 1 }, g.start);

          groupWords.forEach(function (w, i) {
            var wi = g.wordStart + i;
            var wordEl = document.getElementById("wp-w-" + wi);
            var highlighted = w["highlight?"] === true;

            tl.to(
              wordEl,
              { clipPath: "inset(0 0% 0 0)", duration: 0.3, ease: "power2.out" },
              w.start,
            );
            if (highlighted) {
              tl.to(wordEl, { color: "#FFD700", duration: 0.05, overwrite: "auto" }, w.start + 0.1);
            }
            tl.to(
              wordEl,
              { color: "rgba(255,255,255,0.48)", duration: 0.2, overwrite: "auto" },
              w.end,
            );
          });

          var wordEls = grp.querySelectorAll(".wp-word");
          tl.to(
            wordEls,
            {
              clipPath: "inset(0 0% 0 100%)",
              duration: 0.25,
              stagger: 0.04,
              ease: "power2.in",
            },
            g.end - 0.2,
          );
          tl.set(grp, { visibility: "hidden", opacity: 0 }, g.end);
        });

        tl.seek(0);
        window.__timelines["caption-clip-wipe"] = tl;
      })();
    </script>
  </body>
</html>
