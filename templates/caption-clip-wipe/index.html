<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Caption Clip Wipe Subtitle Overlay</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="params-data.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1080px;
        height: 1920px;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      #caption-clip-wipe {
        pointer-events: none;
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: transparent;
      }

      .wp-overlay {
        position: absolute;
        inset: 0;
        background: transparent;
        z-index: 1;
        pointer-events: none;
      }

      #wp-container {
        position: absolute;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }

      .wp-group {
        position: absolute;
        bottom: 650px;
        left: 0;
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        justify-content: center;
        gap: 18px 24px;
        padding: 0 76px;
        visibility: hidden;
      }

      .wp-word {
        display: inline-block;
        padding: 42px 38px 56px;
        margin: -42px -38px -56px;
        clip-path: inset(0 100% 0 0);
        will-change: clip-path, opacity;
      }

      .wp-word-text {
        font-family: "Poppins", sans-serif;
        font-weight: 800;
        font-size: inherit;
        text-transform: uppercase;
        color: #ffffff;
        display: inline-block;
        letter-spacing: 0.02em;
        line-height: 1.08;
        text-shadow:
          0 4px 0 rgba(0, 0, 0, 0.82),
          0 12px 30px rgba(0, 0, 0, 0.78),
          0 0 22px rgba(0, 0, 0, 0.5);
        will-change: color, opacity, text-shadow;
      }
    </style>
  </head>
  <body>
    <div
      id="caption-clip-wipe"
      data-composition-id="caption-clip-wipe"
      data-root="true"
      data-timeline-locked
      data-start="0"
      data-duration="60"
      data-fps="30"
      data-width="1080"
      data-height="1920"
    >
      <div class="wp-overlay"></div>
      <div id="wp-container"></div>
    </div>

    <script>
      // Adapted from the installed registry component:
      // compositions/components/caption-clip-wipe.html
      (function () {
        window.__timelines = window.__timelines || {};

        var data = window.__hyperframesParams;
        var WORDS = data.words;
        var RAW_GROUPS = data.rawGroups;
        var DURATION = data.duration;
        var WORD_REVEAL_MAX = 0.3;
        var WORD_REVEAL_MIN = 0.045;
        var WORD_REVEAL_SPOKEN_RATIO = 0.55;
        var GROUP_TAIL = 0.5;
        var GROUP_END_GAP = 0.02;
        var LAST_WORD_HOLD = 0.07;
        var EXIT_DURATION = 0.25;
        var EXIT_STAGGER = 0.04;

        function wordRevealDuration(word) {
          var spokenDuration = Math.max(0.03, Number(word.end) - Number(word.start));
          var targetDuration = Math.max(WORD_REVEAL_MIN, spokenDuration * WORD_REVEAL_SPOKEN_RATIO);
          var latestReadableDuration = Math.max(0.025, spokenDuration * 0.85);
          return Math.min(WORD_REVEAL_MAX, targetDuration, latestReadableDuration);
        }

        document
          .getElementById("caption-clip-wipe")
          .setAttribute("data-duration", String(DURATION));

        var _fitCanvas = document.createElement("canvas");
        var _fitCtx = _fitCanvas.getContext("2d");
        function fitFontSize(text, baseFontSize, fontWeight, fontFamily, maxWidth) {
          var size = baseFontSize;
          var minSize = Math.floor(baseFontSize * 0.55);
          while (size > minSize) {
            _fitCtx.font = fontWeight + " " + size + "px " + fontFamily;
            if (_fitCtx.measureText(text).width <= maxWidth) return size;
            size -= 2;
          }
          return minSize;
        }

        var GROUPS = RAW_GROUPS.map(function (pair, gi) {
          var ws = pair[0],
            we = pair[1];
          var lastWord = WORDS[we];
          var nextStart = gi + 1 < RAW_GROUPS.length ? WORDS[RAW_GROUPS[gi + 1][0]].start : DURATION;
          var naturalEnd = Math.max(
            lastWord.end + GROUP_TAIL,
            lastWord.start + wordRevealDuration(lastWord) + LAST_WORD_HOLD,
          );
          var hardEnd = Math.min(DURATION, Math.max(lastWord.end, nextStart - GROUP_END_GAP));
          var gEnd = Math.max(lastWord.end, Math.min(naturalEnd, hardEnd));
          return { wordStart: ws, wordEnd: we, start: WORDS[ws].start, end: gEnd };
        });

        var container = document.getElementById("wp-container");
        var tl = gsap.timeline({ paused: true });

        GROUPS.forEach(function (g, gi) {
          var groupWords = WORDS.slice(g.wordStart, g.wordEnd + 1);
          var grp = document.createElement("div");
          grp.className = "wp-group";
          grp.id = "wp-grp-" + gi;

          var groupText = groupWords
            .map(function (w) {
              return w.text.toUpperCase();
            })
            .join(" ");
          var computedSize = fitFontSize(groupText, 76, "800", "Poppins", 920);

          groupWords.forEach(function (w, i) {
            var wi = g.wordStart + i;
            var span = document.createElement("span");
            var text = document.createElement("span");
            span.className = "wp-word";
            span.id = "wp-w-" + wi;
            span.style.fontSize = computedSize + "px";
            text.className = "wp-word-text";
            text.textContent = w.text.toUpperCase();
            span.appendChild(text);
            grp.appendChild(span);
          });

          container.appendChild(grp);
          tl.set(grp, { visibility: "visible", opacity: 1 }, g.start);

          groupWords.forEach(function (w, i) {
            var wi = g.wordStart + i;
            var wordEl = document.getElementById("wp-w-" + wi);
            var textEl = wordEl.querySelector(".wp-word-text");
            var highlighted = w["highlight?"] === true;

            tl.to(
              wordEl,
              { clipPath: "inset(0 0% 0 0)", duration: wordRevealDuration(w), ease: "power2.out" },
              w.start,
            );
            if (highlighted) {
              tl.to(textEl, { color: "#FFD700", duration: 0.05, overwrite: "auto" }, w.start + 0.1);
            }
            tl.to(
              textEl,
              {
                color: "rgba(255,255,255,0.62)",
                textShadow: "0 3px 0 rgba(0,0,0,0.42), 0 8px 18px rgba(0,0,0,0.38)",
                duration: 0.2,
                overwrite: "auto",
              },
              w.end,
            );
          });

          var wordEls = grp.querySelectorAll(".wp-word");
          var lastWord = WORDS[g.wordEnd];
          var safeExitStart = Math.max(
            lastWord.end,
            lastWord.start + wordRevealDuration(lastWord) + LAST_WORD_HOLD,
          );
          var exitStart = Math.max(g.start, g.end - EXIT_DURATION);
          var exitTimeAvailable = g.end - safeExitStart;

          if (exitStart < safeExitStart && exitTimeAvailable >= 1 / 30) {
            exitStart = safeExitStart;
          }

          if (exitStart >= safeExitStart && g.end - exitStart >= 1 / 30) {
            tl.to(
              wordEls,
              {
                clipPath: "inset(0 0% 0 100%)",
                duration: Math.min(EXIT_DURATION, g.end - exitStart),
                stagger: EXIT_STAGGER,
                ease: "power2.in",
              },
              exitStart,
            );
          }
          tl.set(grp, { visibility: "hidden", opacity: 0 }, g.end);
        });

        tl.seek(0);
        window.__timelines["caption-clip-wipe"] = tl;
      })();
    </script>
  </body>
</html>
